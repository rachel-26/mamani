<style>

<body class="min-h-screen flex flex-col items-center justify-center brand-gradient p-margin-mobile md:p-margin-desktop overflow-x-hidden">
<!-- Header Navigation (Simplified for Transactional Screen) -->
<header class="fixed top-0 w-full z-50 h-16 flex items-center px-lg">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-[20px]" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">SmartFinance</span>
</div>
</header>
<!-- Main Content Container -->
<main class="w-full max-w-[480px] mt-16 md:mt-0 z-10">
<!-- Welcome Section -->
<div class="text-center mb-lg">
<h1 class="font-headline-lg text-headline-lg md:text-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-lg text-body-lg text-secondary">Sign in to manage your wealth.</p>
</div>
<!-- Auth Card -->
<div class="glass-card rounded-xl p-md md:p-lg space-y-md">
<!-- Social Login Cluster -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-sm bg-surface-container-lowest border border-outline-variant py-sm px-md rounded-lg hover:bg-surface-container-low transition-all active:scale-[0.98]">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBy1HtGVnovSbvSsJ6RUh5dkiUKOhZLVz9hibMIRbza4GCxDVlWtDahbVxEFmh3acx2U5fbg1bGaay1lA7vagve36wLjxUj4UuKKvd87Z2DiCiB4Y3rFHBPzo-qx1N86VJm3rloFSlIYfv9DTAcKjsJ81hLSYQScYwxk8bGp-cD-1g6n7T4mZccPVoC536tJbjhvDGMJ8zeOMt1p0tIFHY6vUb9sl3Vv-ELa1IzOQIFTWg6XECdDGzhMmNnOLw68Z3a3kzz-Zk7y3g"/>
<span class="font-label-md text-label-md text-on-surface">Sign in with Google</span>
</button>
<button class="flex items-center justify-center gap-sm bg-surface-container-lowest border border-outline-variant py-sm px-md rounded-lg hover:bg-surface-container-low transition-all active:scale-[0.98]">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"></path></svg>
<span class="font-label-md text-label-md text-on-surface">Sign in with Apple</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-sm py-2">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest px-2">OR CONTINUE WITH EMAIL</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<!-- Email & Password Form -->
<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-12 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest focus:outline-none focus:border-primary-container input-glow transition-all font-body-md text-body-md" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-12 pr-12 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest focus:outline-none focus:border-primary-container input-glow transition-all font-body-md text-body-md" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary-container cursor-pointer" type="checkbox"/>
<span class="font-label-md text-label-md text-secondary group-hover:text-on-surface transition-colors">Remember Me</span>
</label>
<a class="font-label-md text-label-md text-tertiary hover:underline" href="#">Forgot Password?</a>
</div>
<!-- CTA -->
<button class="w-full py-4 bg-primary-container hover:bg-[#04c786] text-on-primary-container font-headline-sm text-headline-sm rounded-lg shadow-lg shadow-primary-container/20 transition-all active:scale-[0.97] flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="text-center pt-sm">
<p class="font-body-sm text-body-sm text-secondary">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Security Disclaimer -->
<div class="mt-lg flex items-center justify-center gap-2 text-outline opacity-60">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="font-label-sm text-label-sm">Secure AES-256 Encrypted Connection</span>
</div>
</main>
<!-- Atmospheric Background Decoration -->
<div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[350px] h-[350px] bg-tertiary-container/20 blur-[100px] rounded-full"></div>
</div>
<!-- Background Animation (Subtle Atmospheric) -->
<div class="fixed inset-0 -z-20 opacity-40">

</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerText = 'visibility';
            }
        }

        // Simple button interaction feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => button.classList.add('scale-95'));
            button.addEventListener('mouseup', () => button.classList.remove('scale-95'));
            button.addEventListener('mouseleave', () => button.classList.remove('scale-95'));
        });
    </script>
