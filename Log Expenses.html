<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Add Transaction - Finance Tracker</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-animations">
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-up {
      animation: slideUp 0.4s ease-out forwards;
    }
    /* Custom radio hide */
    .type-toggle input:checked + label {
      background-color: white;
      color: #111827;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased select-none">
<!-- BEGIN: MainContainer -->
<main class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative overflow-hidden">
<!-- BEGIN: TopNavigation -->
<header class="p-6 flex items-center justify-between" data-purpose="header-navigation">
<button aria-label="Go back" class="p-2 -ml-2 text-slate-400 hover:text-slate-600 transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h1 class="text-lg font-semibold text-slate-800">Add Transaction</h1>
<div class="w-10"></div> <!-- Spacer for centering title -->
</header>
<!-- END: TopNavigation -->
<!-- BEGIN: TransactionForm -->
<form class="flex-1 flex flex-col px-6 pb-8 space-y-8 animate-slide-up" data-purpose="transaction-entry-form">
<!-- BEGIN: AmountSection -->
<section class="text-center py-4" data-purpose="amount-input-container">
<label class="block text-sm font-medium text-slate-500 mb-2 uppercase tracking-wider" for="amount">Amount</label>
<div class="relative inline-block w-full">
<span class="absolute left-0 top-1/2 -translate-y-1/2 text-4xl font-light text-slate-400">$</span>
<input class="w-full bg-transparent border-none text-center text-6xl font-bold focus:ring-0 placeholder-slate-200 text-slate-800" id="amount" name="amount" placeholder="0.00" required="" step="0.01" type="number"/>
</div>
</section>
<!-- END: AmountSection -->
<!-- BEGIN: TransactionTypeToggle -->
<div class="flex p-1 bg-slate-100 rounded-2xl type-toggle" data-purpose="transaction-type-switcher">
<div class="flex-1">
<input checked="" class="hidden" id="expense" name="transaction_type" type="radio"/>
<label class="block text-center py-3 rounded-xl cursor-pointer font-medium text-slate-500 transition-all" for="expense">Expense</label>
</div>
<div class="flex-1">
<input class="hidden" id="income" name="transaction_type" type="radio"/>
<label class="block text-center py-3 rounded-xl cursor-pointer font-medium text-slate-500 transition-all" for="income">Income</label>
</div>
</div>
<!-- END: TransactionTypeToggle -->
<!-- BEGIN: DetailsGrid -->
<div class="space-y-6">
<!-- Category Selector -->
<div data-purpose="category-picker">
<label class="block text-sm font-medium text-slate-500 mb-3">Category</label>
<div class="grid grid-cols-4 gap-4">
<!-- Category Item -->
<button class="flex flex-col items-center gap-2 group" type="button">
<div class="w-14 h-14 rounded-2xl bg-orange-100 text-orange-600 flex items-center justify-center transition-transform active:scale-90 group-hover:bg-orange-200">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xs font-medium text-slate-600">Food</span>
</button>
<button class="flex flex-col items-center gap-2 group" type="button">
<div class="w-14 h-14 rounded-2xl bg-blue-100 text-blue-600 flex items-center justify-center transition-transform active:scale-90 group-hover:bg-blue-200">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xs font-medium text-slate-600">Transport</span>
</button>
<button class="flex flex-col items-center gap-2 group" type="button">
<div class="w-14 h-14 rounded-2xl bg-purple-100 text-purple-600 flex items-center justify-center transition-transform active:scale-90 group-hover:bg-purple-200">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xs font-medium text-slate-600">Rent</span>
</button>
<button class="flex flex-col items-center gap-2 group" type="button">
<div class="w-14 h-14 rounded-2xl bg-slate-100 text-slate-400 flex items-center justify-center border-2 border-dashed border-slate-200 transition-transform active:scale-90">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xs font-medium text-slate-400">More</span>
</button>
</div>
</div>
<!-- Date Picker -->
<div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl" data-purpose="date-input">
<div class="flex items-center gap-3">
<div class="p-2 bg-white rounded-lg shadow-sm text-indigo-500">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="text-xs text-slate-400 font-medium">Date</p>
<p class="text-sm font-semibold text-slate-700">Today, 14 Oct 2023</p>
</div>
</div>
<button class="text-indigo-600 text-sm font-semibold px-2 py-1" type="button">Change</button>
</div>
<!-- Notes Field -->
<div class="space-y-2" data-purpose="notes-input">
<label class="block text-sm font-medium text-slate-500" for="notes">Notes (Optional)</label>
<textarea class="w-full border-slate-200 rounded-2xl focus:ring-indigo-500 focus:border-indigo-500 placeholder-slate-300 resize-none p-4" id="notes" placeholder="What was this for?..." rows="3"></textarea>
</div>
</div>
<!-- END: DetailsGrid -->
<!-- BEGIN: ActionButtons -->
<div class="mt-auto pt-6" data-purpose="form-actions">
<button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-slate-200 hover:bg-slate-800 active:scale-[0.98] transition-all" type="submit">
          Save Transaction
        </button>
</div>
<!-- END: ActionButtons -->
</form>
<!-- END: TransactionForm -->
<!-- Mobile Indicator Bar -->
<div class="w-32 h-1.5 bg-slate-200 rounded-full mx-auto mb-2 mt-auto"></div>
</main>
<!-- END: MainContainer -->
<script data-purpose="form-interactivity">
    // Simple script to handle visual toggle logic if needed, 
    // although Tailwind and CSS handled most of it.
    document.querySelectorAll('input[name="transaction_type"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const amountDisplay = document.querySelector('input#amount');
        if (e.target.id === 'income') {
          amountDisplay.classList.remove('text-slate-800');
          amountDisplay.classList.add('text-emerald-600');
        } else {
          amountDisplay.classList.remove('text-emerald-600');
          amountDisplay.classList.add('text-slate-800');
        }
      });
    });
  </script>
</body></html>
